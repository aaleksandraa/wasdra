<!doctype html>
<html lang="de-CH">
  <head>
    <meta charset="utf-8" />
    <title>WASDRA.CH</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function () {
        const pathSegmentsToKeep = 0;
        const location = window.location;
        const newUrl =
          location.protocol +
          "//" +
          location.hostname +
          (location.port ? ":" + location.port : "") +
          location.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          location.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (location.search
            ? "&" + location.search.slice(1).replace(/&/g, "~and~")
            : "") +
          location.hash;

        location.replace(newUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
